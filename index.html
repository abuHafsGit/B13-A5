<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker Login
    </title>
</head>

<body>
    <main class="bg-[#F8FAFC] max-h-screen py-3">
        <section class="max-w-md mx-auto bg-white shadow-lg rounded-lg ">
            <div class="p-8 flex flex-col gap-6">
                <div class=" flex flex-col justify-center items-center gap-6">
                    <img class="w-15" src="./assets/github-logo.png" alt="github-logo">
                    <div>
                        <h2 class=" text-[#1F2937] font-semibold text-2xl ">GitHub Issues Tracker</h2>
                        <p class="text-[#71717A] text-base">Sign in to manage your issues</p>
                    </div>
                </div>
                <div class=" space-y-2">
                    <div class=" flex flex-col space-y-2">
                        <label class="text[#1F2937] text-base font-medium" for="Username">Username</label>
                        <input id="userName" class="p-4 rounded-lg border-[#E4E4E7] outline-[#E4E4E7] " name='Username'
                            placeholder="Enter Username" type="text">
                        <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
                    </div>
                    <div class=" flex flex-col space-y-2">
                        <label class="text[#1F2937] text-base font-medium" for="">Password</label>
                        <input id="userPassword" class="p-4 rounded-lg border-[#E4E4E7] outline-[#E4E4E7] "
                            placeholder="Enter Password" type="password">
                        <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
                    </div>
                    <button id="login"
                        class="bg-[#4A00FF] text-white w-full p-4 rounded-lg cursor-pointer active:scale-98">Sign
                        In</button>
                </div>
                <div class=" flex justify-center items-center text-center h-4">
                    <hr class="w-[48%]">
                    <p class="text-[#1F2937] text-base">OR</p>
                    <hr class="w-[48%]">
                </div>
                <div class=" flex flex-col justify-center items-center gap-6">
                    <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
                    <div>
                        <h3 class="text-base"><span class=" font-semibold  text-[#1F2937]">Username:</span> admin</h3>
                        <h3 class="text-base"><span class=" font-semibold  text-[#1F2937]">Password:</span>
                            admin123</h3>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./script/login.js"></script>
</body>

</html>
