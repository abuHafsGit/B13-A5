<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker</title>
</head>

<body>
    <main class=" w-11/12 mx-auto">
        <header>
            <nav class=" flex flex-col sm:flex-row justify-between items-center py-4 ">
                <div class=" flex gap-1">
                    <img class="w-8" src="./assets/github-logo.png" alt="">
                    <p class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
                </div>
                <div class=" flex justify-center items-center gap-4 ">
                    <div
                        class=" flex justify-center items-center text-center border py-3 px-3 gap-2 rounded-lg border-[#64748B]">
                        <img src="./assets/MagnifyingGlass.png" alt="">
                        <input class=" border-none outline-none " type="text" placeholder="Search issues...">
                    </div>
                    <button
                        class="bg-[#4A00FF] text-white text-base font-semibold py-3 px-3 rounded-lg cursor-pointer"><span>+</span>
                        New
                        Issue</button>
                </div>
            </nav>
        </header>
        <div class=" container mx-auto lg:px-40 bg-[#F8FAFC] lg:py-15">
            <section class=" shadow-sm mb-5 p-6 rounded-lg bg-white flex gap-2">
                <button onclick="toggleBtn(id)" id="all_btn"
                    class="w-[120px] h-[40px] text-center bg-[#4A00FF] text-white text-gray-500 border border-[#64748B] text-base font-semibold py-2 px-3 rounded-lg cursor-pointer">All
                </button>
                <button onclick="toggleBtn(id)" id="open_btn"
                    class="w-[120px] h-[40px]  border border-[#64748B]  text-gray-500 text-base font-semibold py-2 px-3 rounded-lg cursor-pointer">Open
                </button>
                <button onclick="toggleBtn(id)" id="closed_btn"
                    class="w-[120px] h-[40px]  border border-[#64748B]  text-gray-500 text-base font-semibold py-2 px-3 rounded-lg cursor-pointer">Closed
                </button>
            </section>

            <section>
                <!-- <section class="flex justify-between items-center shadow-sm mb-5 p-6 rounded-lg bg-white">
                    <div class=" flex justify-center items-center gap-1">
                        <div class=" w-12 h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h3 class=" font-semibold text-[20px]">50 Issues</h3>
                            <p class="text-[#64748B] text-base">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class=" flex gap-2">
                        <div class=" flex justify-center items-center gap-1 ">
                            <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                            <div class=" font-medium text-base">Open</div>
                        </div>
                        <div class=" flex justify-center items-center gap-1 ">
                            <div class="w-3 h-3 rounded-full bg-purple-700"></div>
                            <div class=" font-medium text-base">Closed</div>
                        </div>
                    </div>
                </section> -->

                <section class="shadow-sm mb-5 p-6 rounded-lg bg-[#FBFBFB]">
                    <!-- all issues -->
                    <div>
                        <section id="all_issue_count" class="flex justify-between items-center shadow-sm mb-5 p-6 rounded-lg bg-white">
                            <div class=" flex justify-center items-center gap-1">
                                <div class=" w-12 h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full">
                                    <img src="./assets/Aperture.png" alt="">
                                </div>
                                <div>
                                    <h3 class=" font-semibold text-[20px]">50 Issues</h3>
                                    <p class="text-[#64748B] text-base">Track and manage your project issues</p>
                                </div>
                            </div>
                            <div class=" flex gap-2">
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                                    <div class=" font-medium text-base">Open</div>
                                </div>
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-purple-700"></div>
                                    <div class=" font-medium text-base">Closed</div>
                                </div>
                            </div>
                        </section>
                        <div id="all_issues"
                            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3  lg:grid-cols-4 gap-3">

                        </div>
                    </div>
                    <!-- loding -->
                    <div id="loding_spiner" class=" hidden justify-center items-center h-[60vh]">
                        <span class="loading loading-spinner loading-xl"></span>
                    </div>
                    <!-- open issue -->
                    <div>
                        <section id="open_issue_count" class="flex justify-between items-center shadow-sm mb-5 p-6 rounded-lg bg-white">
                            <div class=" flex justify-center items-center gap-1">
                                <div class=" w-12 h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full">
                                    <img src="./assets/Aperture.png" alt="">
                                </div>
                                <div>
                                    <h3 class=" font-semibold text-[20px]">44 Open Issues</h3>
                                    <p class="text-[#64748B] text-base">Track and manage your project issues</p>
                                </div>
                            </div>
                            <div class=" flex gap-2">
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                                    <div class=" font-medium text-base">Open</div>
                                </div>
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-purple-700"></div>
                                    <div class=" font-medium text-base">Closed</div>
                                </div>
                            </div>
                        </section>
                        <div id="open_issue"
                            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3  lg:grid-cols-4 gap-3">

                        </div>
                    </div>
                    <!-- closed issue  -->
                    <div>
                        <section class="flex justify-between items-center shadow-sm mb-5 p-6 rounded-lg bg-white">
                            <div class=" flex justify-center items-center gap-1">
                                <div class=" w-12 h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full">
                                    <img src="./assets/Aperture.png" alt="">
                                </div>
                                <div>
                                    <h3 class=" font-semibold text-[20px]">8 Closed Issues</h3>
                                    <p class="text-[#64748B] text-base">Track and manage your project issues</p>
                                </div>
                            </div>
                            <div class=" flex gap-2">
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                                    <div class=" font-medium text-base">Open</div>
                                </div>
                                <div class=" flex justify-center items-center gap-1 ">
                                    <div class="w-3 h-3 rounded-full bg-purple-700"></div>
                                    <div class=" font-medium text-base">Closed</div>
                                </div>
                            </div>
                        </section>
                        <div id="closed_issue"
                            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3  lg:grid-cols-4 gap-3">

                        </div>
                    </div>

                </section>

                <section>
                    <!-- Open the modal using ID.showModal() method -->
                    <dialog id="issue_details_model" class="modal">

                    </dialog>
                </section>
            </section>
        </div>
    </main>

    <script src="./script/fetchData.js"></script>
</body>

</html>
